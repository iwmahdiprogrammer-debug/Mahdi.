<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MahdiPlayer Ultra Pro</title>

<style>
body {
  margin: 0;
  background: #050505;
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
}

/* صفحه ورود */
#welcome {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(circle, #000 0%, #050505 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #00eaff;
  font-size: 2.5rem;
  letter-spacing: 3px;
  animation: fadeOut 2s ease-in-out 4s forwards;
  z-index: 999;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* تایپینگ */
.typing {
  border-right: 3px solid #00eaff;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 3s steps(30) forwards;
  text-shadow: 0 0 15px #00eaff;
}

@keyframes typing {
  to { width: 300px; }
}

/* پلیر */
#playerBox {
  width: 95%;
  max-width: 900px;
  margin: 140px auto;
  padding: 25px;
  background: #0d0d0d;
  border-radius: 20px;
  box-shadow: 0 0 40px #00eaff55;
  opacity: 0;
  transform: translateY(40px);
  animation: showPlayer 1.5s ease-in-out 5s forwards;
}

@keyframes showPlayer {
  to { opacity: 1; transform: translateY(0); }
}

video {
  width: 100%;
  border-radius: 16px;
  background: #000;
  box-shadow: 0 0 25px #00eaff55;
  transform: perspective(800px) rotateX(2deg);
}

/* پارالاکس */
body:hover #playerBox {
  transform: translateY(-5px);
}
</style>
</head>

<body>

<!-- خوش آمدگویی -->
<div id="welcome">
  <div class="typing">Welcome Mahdi</div>
</div>

<!-- پلیر -->
<div id="playerBox">
  <video id="player" controls></video>
</div>

<script>
const parts = [
  "https://raw.githubusercontent.com/USERNAME/REPO/main/20260711_192115_001.mp4",
  "https://raw.githubusercontent.com/USERNAME/REPO/main/20260711_192115_002.mp4",
  "https://raw.githubusercontent.com/USERNAME/REPO/main/20260711_192115_003.mp4",
  "https://raw.githubusercontent.com/USERNAME/REPO/main/20260711_192115_004.mp4
  "https://raw.githubusercontent.com/USERNAME/REPO/main/20260711_192115_003.mp4"
];

async function mergeVideoParts() {
  let buffers = [];

  for (let url of parts) {
    let res = await fetch(url);
    let buf = await res.arrayBuffer();
    buffers.push(buf);
  }

  let totalLength = buffers.reduce((sum, b) => sum + b.byteLength, 0);
  let merged = new Uint8Array(totalLength);

  let offset = 0;
  for (let b of buffers) {
    merged.set(new Uint8Array(b), offset);
    offset += b.byteLength;
  }

  let blob = new Blob([merged], { type: "video/mp4" });
  let videoURL = URL.createObjectURL(blob);

  document.getElementById("player").src = videoURL;
}

mergeVideoParts();
</script>

</body>
</html>
