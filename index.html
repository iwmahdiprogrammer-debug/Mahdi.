<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MahdiPlayer</title>

<style>
body {
  margin: 0;
  background: #050505;
  font-family: 'Poppins', sans-serif;
}

/* خوش‌آمدگویی */
#welcome {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #00eaff;
  font-size: 2.2rem;
  letter-spacing: 2px;
  animation: fadeOut 2s ease-in-out 3s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

.typing {
  border-right: 3px solid #00eaff;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 3s steps(30) forwards;
  text-shadow: 0 0 15px #00eaff;
}

@keyframes typing {
  to { width: 260px; }
}

/* پلیر */
#playerBox {
  width: 95%;
  max-width: 900px;
  margin: 120px auto;
  padding: 20px;
  background: #0d0d0d;
  border-radius: 16px;
  box-shadow: 0 0 30px #00eaff55;
}

video {
  width: 100%;
  border-radius: 12px;
  background: #000;
}
</style>
</head>

<body>

<div id="welcome">
  <div class="typing">Welcome Mahdi</div>
</div>

<div id="playerBox">
  <video id="player" controls></video>
</div>

<script>
const player = document.getElementById("player");

// لینک واقعی‌ات رو اینجا بذار
player.src = "https://raw.githubusercontent.com/Mahdi/iwmahdiprogrammer-debug/main/20260711_192115_001.mp4";
</script>

</body>
</html>
