<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>مهدی مرمزی</title>

<style>
body {
  margin: 0;
  background: #050505;
  font-family: 'Poppins', sans-serif;
}

/* خوش‌آمدگویی */
#welcome {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #00eaff;
  font-size: 2.5rem;
  letter-spacing: 3px;
  animation: fadeOut 2s ease-in-out 4s forwards;
  z-index: 999;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

.typing {
  border-right: 3px solid #00eaff;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 3s steps(30) forwards;
  text-shadow: 0 0 15px #00eaff;
}

@keyframes typing {
  to { width: 300px; }
}

/* پلیر */
#playerBox {
  width: 95%;
  max-width: 900px;
  margin: 140px auto;
  padding: 25px;
  background: #0d0d0d;
  border-radius: 20px;
  box-shadow: 0 0 40px #00eaff55;
}

video {
  width: 100%;
  border-radius: 16px;
  background: #000;
}
</style>
</head>

<body>

<div id="welcome">
  <div class="typing">Welcome Mahdi</div>
</div>

<div id="playerBox">
  <video id="player" controls></video>
</div>

<script>
const parts = [
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_001.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_002.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_003.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_004.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_005.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_006.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_007.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_008.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_009.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_010.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_011.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_012.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_102.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_920.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_820.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192115_720.mp4",
  "https://raw.githubusercontent.com/Mahdi./iwmahdiprogrammer-debug/main/20260711_192703.mp4"
];

let index = 0;
const player = document.getElementById("player");

function playNext() {
  if (index < parts.length) {
    player.src = parts[index];
    player.play();
    index++;
  }
}

player.addEventListener("ended", playNext);

// شروع پخش
playNext();
</script>

</body>
</html>
